<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1920" height="100" fill="#f1f5f9"/>
  <text x="60" y="60" font-family="Arial" font-size="32" fill="#0f172a" font-weight="bold">BYOD Data Architecture</text>
  
  <!-- Cloud Zone -->
  <rect x="200" y="200" width="600" height="600" rx="300" fill="#eff6ff" opacity="0.5"/>
  <text x="400" y="250" font-family="Arial" font-size="24" fill="#1e40af" font-weight="bold">EdPsych Cloud</text>
  
  <!-- Local Zone -->
  <rect x="1100" y="200" width="600" height="600" rx="30" fill="#f0fdf4" stroke="#16a34a" stroke-width="4" stroke-dasharray="10,10"/>
  <text x="1300" y="250" font-family="Arial" font-size="24" fill="#166534" font-weight="bold">Local Authority (Secure)</text>
  
  <!-- Connection -->
  <path d="M800 500 L1100 500" stroke="#94a3b8" stroke-width="8" stroke-dasharray="20,20"/>
  <circle cx="950" cy="500" r="40" fill="#ffffff" stroke="#64748b" stroke-width="4"/>
  <text x="935" y="510" font-family="Arial" font-size="30" fill="#64748b">🔒</text>
  
  <!-- Cloud Components -->
  <rect x="350" y="350" width="300" height="100" rx="8" fill="#3b82f6"/>
  <text x="420" y="410" font-family="Arial" font-size="20" fill="#ffffff">App Logic</text>
  
  <rect x="350" y="550" width="300" height="100" rx="8" fill="#3b82f6"/>
  <text x="420" y="610" font-family="Arial" font-size="20" fill="#ffffff">Global Analytics</text>
  
  <!-- Local Components -->
  <rect x="1250" y="350" width="300" height="100" rx="8" fill="#22c55e"/>
  <text x="1320" y="410" font-family="Arial" font-size="20" fill="#ffffff">Student PII DB</text>
  
  <rect x="1250" y="550" width="300" height="100" rx="8" fill="#22c55e"/>
  <text x="1320" y="610" font-family="Arial" font-size="20" fill="#ffffff">Case Files</text>
  
  <!-- Legend -->
  <rect x="60" y="900" width="400" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <circle cx="100" cy="940" r="10" fill="#3b82f6"/>
  <text x="130" y="945" font-family="Arial" font-size="18" fill="#334155">Cloud Hosted (No PII)</text>
  <circle cx="100" cy="980" r="10" fill="#22c55e"/>
  <text x="130" y="985" font-family="Arial" font-size="18" fill="#334155">Locally Hosted (PII Safe)</text>
  
  <!-- Watermark -->
  <text x="1700" y="1040" font-family="Arial" font-size="24" fill="#94a3b8" opacity="0.5">EdPsych Connect</text>
</svg>